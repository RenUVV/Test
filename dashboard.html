<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a2332;min-height:100vh;}

.topbar{
  background:#1a2332;color:white;
  padding:0 24px;
  height:56px;
  display:flex;justify-content:space-between;align-items:center;
}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-brand .dot{width:8px;height:8px;border-radius:50%;background:#27ae60;}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:0.3px;}
.topbar a{
  color:#a8c4e0;text-decoration:none;font-size:12px;
  border:1px solid rgba(255,255,255,0.15);
  padding:5px 12px;border-radius:6px;
  transition:background 0.15s;
}
.topbar a:hover{background:rgba(255,255,255,0.08);}

.page{padding:20px 20px 40px;}

.date-section{
  background:white;border-radius:12px;padding:16px 20px;margin-bottom:16px;
  border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;
}
.date-nav{display:flex;align-items:center;gap:8px;}
.date-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.date-display{font-size:16px;font-weight:600;color:#1a2332;}
.nav-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid #e2e8f0;
  background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#475569;transition:all 0.15s;
}
.nav-btn:hover{background:#f1f5f9;border-color:#cbd5e1;}
input[type=date]{
  border:1px solid #e2e8f0;border-radius:8px;padding:6px 10px;
  font-size:14px;color:#1a2332;background:white;cursor:pointer;
}
.date-actions{display:flex;gap:8px;}
.btn-reset{
  padding:7px 16px;border-radius:8px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;background:#fee2e2;color:#991b1b;
}
.btn-doneall{
  padding:7px 16px;border-radius:8px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;background:#dcfce7;color:#166534;
}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat-card{
  background:white;border-radius:12px;padding:16px 20px;
  border:1px solid #e2e8f0;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.total::before{background:#1a2332;}
.stat-card.tunai::before{background:#16a34a;}
.stat-card.cod::before{background:#ea580c;}
.stat-card.acc::before{background:#7c3aed;}
.stat-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.stat-count{font-size:26px;font-weight:700;color:#1a2332;}
.stat-amount{font-size:13px;color:#64748b;margin-top:4px;}

.filters-row{display:flex;gap:10px;margin-bottom:14px;align-items:center;}
.search-wrap{position:relative;flex:1;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 36px;
  border:1px solid #e2e8f0;border-radius:8px;font-size:13px;
}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;}
.filter-select{
  padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;
  font-size:13px;min-width:110px;background:white;
}

.table-wrap{background:white;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;}
.table-header{
  padding:14px 20px;border-bottom:1px solid #f1f5f9;
  display:flex;justify-content:space-between;align-items:center;
}
.table-title{font-size:14px;font-weight:600;}
.table-count{font-size:12px;color:#94a3b8;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#f8fafc;}
th{
  padding:10px 12px;font-size:11px;font-weight:600;
  color:#64748b;text-transform:uppercase;border-bottom:1px solid #f1f5f9;
}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid #f8fafc;}
tbody tr:hover{background:#fafbff;}

.pay-badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;}
.pay-badge.TUNAI{background:#dcfce7;color:#15803d;}
.pay-badge.COD{background:#ffedd5;color:#c2410c;}
.pay-badge.ACC{background:#ede9fe;color:#6d28d9;}

.loading,.empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px;}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="dot"></div>
    <h1>Dashboard - Arsyila Bersaudara</h1>
  </div>
  <a href="index.html">← Back to Form</a>
</div>

<div class="page">

  <div class="date-section">
    <div class="date-nav">
      <button class="nav-btn" onclick="prevDate()">&#9664;</button>
      <div>
        <div class="date-label">Tarikh</div>
        <div class="date-display" id="date-display">—</div>
      </div>
      <button class="nav-btn" onclick="nextDate()">&#9654;</button>
      <input type="date" id="date" onchange="onDateChange()" style="margin-left:8px;">
    </div>
    <div class="date-actions">
      <button class="btn-reset" onclick="resetDate()">Reset</button>
      <button class="btn-doneall" onclick="doneAll()">Done</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card total">
      <div class="stat-label">Total Bill</div>
      <div class="stat-count" id="st-total">0</div>
      <div class="stat-amount" id="st-total-amt">RM 0.00</div>
    </div>
    <div class="stat-card tunai">
      <div class="stat-label">Cash</div>
      <div class="stat-count" id="st-tunai">0</div>
      <div class="stat-amount" id="sum-tunai">RM 0.00</div>
    </div>
    <div class="stat-card cod">
      <div class="stat-label">COD</div>
      <div class="stat-count" id="st-cod">0</div>
      <div class="stat-amount" id="sum-cod">RM 0.00</div>
    </div>
    <div class="stat-card acc">
      <div class="stat-label">ACC</div>
      <div class="stat-count" id="st-acc">0</div>
      <div class="stat-amount" id="sum-acc">RM 0.00</div>
    </div>
  </div>

  <div class="filters-row">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="f-search" placeholder="Cari bil, nama, telefon..." oninput="renderTable()">
    </div>
    <select class="filter-select" id="f-pay" onchange="renderTable()">
      <option value="">Semua Jenis</option>
      <option value="TUNAI">CASH</option>
      <option value="COD">COD</option>
      <option value="ACC">ACC</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">Senarai Bil</div>
      <div class="table-count" id="table-count">0 rekod</div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>No</th><th>Tarikh</th><th>Staff</th>
            <th>Pengirim</th><th>Tel</th><th>Dari</th>
            <th>Penerima</th><th>Tel</th><th>Ke</th>
            <th>Butiran</th><th>Bayaran</th><th>RM</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="12" class="loading">Memuatkan data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ✅ MODAL DIPINDAHKAN KE SINI (LUAR SCRIPT) -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:12px;padding:24px;margin:16px;max-width:320px;width:100%;">
    <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Reset Tarikh</div>
    <div style="font-size:13px;margin-bottom:20px;" id="modal-msg"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="closeModal()" style="padding:8px 16px;border-radius:8px;border:1px solid #e2e8f0;background:white;">Batal</button>
      <button onclick="confirmReset()" style="padding:8px 16px;border-radius:8px;border:none;background:#fee2e2;color:#991b1b;font-weight:600;">Ya, Delete</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwv00ln2dSY_RId9RRdMDSsp_Sm9HMp1W5wmPUnBaL_WZBkojuEtc-ygsTMKxYBNP2nUw/exec";

let data=[];
const dateInput=document.getElementById('date');
const dateDisplay=document.getElementById('date-display');

function today(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function formatDisplay(val){
  if(!val)return'—';
  const[y,m,d]=val.split('-');
  const months=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogs','Sep','Okt','Nov','Dis'];
  return d+' '+months[parseInt(m)-1]+' '+y;
}

function setDate(val){
  dateInput.value=val;
  dateDisplay.textContent=formatDisplay(val);
}

setDate(today());

function onDateChange(){dateDisplay.textContent=formatDisplay(dateInput.value);load();}
function prevDate(){let d=new Date(dateInput.value);d.setDate(d.getDate()-1);setDate(d.toISOString().split('T')[0]);load();}
function nextDate(){let d=new Date(dateInput.value);d.setDate(d.getDate()+1);setDate(d.toISOString().split('T')[0]);load();}

function load(){
  const d=dateInput.value;
  fetch(SCRIPT_URL+"?action=getAll&date="+d)
  .then(r=>r.json())
  .then(json=>{
    data=json.data||[];
    renderTable();
    calc();
  })
  .catch(()=>{
    document.getElementById('tbody').innerHTML='<tr><td colspan="12" class="empty">Gagal memuatkan data.</td></tr>';
  });
}

function renderTable(){
  const tb=document.getElementById('tbody');
  const s=document.getElementById('f-search').value.toLowerCase();
  const pay=document.getElementById('f-pay').value;

  let filtered=data.filter(r=>{
    if(!r || r.join('').trim()==='')return false;
    return(!s||r.join(' ').toLowerCase().includes(s))&&(!pay||r[10]===pay);
  });

  document.getElementById('table-count').textContent=filtered.length+' rekod';

  if(!filtered.length){
    tb.innerHTML='<tr><td colspan="12" class="empty">Tiada data dijumpai.</td></tr>';
    return;
  }

  tb.innerHTML=filtered.map(r=>`
  <tr>
    <td><strong>${r[0]}</strong></td>
    <td>${r[1]}</td>
    <td>${r[2]}</td>
    <td>${r[3]}</td>
    <td>${r[4]}</td>
    <td>${r[5]}</td>
    <td>${r[6]}</td>
    <td>${r[7]}</td>
    <td>${r[8]}</td>
    <td>${r[9]}</td>
    <td><span class="pay-badge ${r[10]}">${r[10]}</span></td>
    <td><strong>RM ${parseFloat(r[11]||0).toFixed(2)}</strong></td>
  </tr>`).join('');
}

function calc(){
  let t=0,c=0,a=0,ct=0,cc=0,ca=0;
  data.forEach(r=>{
    if(!r || r.join('').trim()==='')return;
    let amt=parseFloat(r[11])||0;
    if(r[10]==='TUNAI'){t+=amt;ct++;}
    if(r[10]==='COD'){c+=amt;cc++;}
    if(r[10]==='ACC'){a+=amt;ca++;}
  });
  const total=ct+cc+ca;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-total-amt').textContent='RM '+(t+c+a).toFixed(2);
  document.getElementById('st-tunai').textContent=ct;
  document.getElementById('sum-tunai').textContent='RM '+t.toFixed(2);
  document.getElementById('st-cod').textContent=cc;
  document.getElementById('sum-cod').textContent='RM '+c.toFixed(2);
  document.getElementById('st-acc').textContent=ca;
  document.getElementById('sum-acc').textContent='RM '+a.toFixed(2);
}

function doneAll(){
  let t=0,c=0,a=0;
  data.forEach(r=>{
    if(!r || r.join('').trim()==='')return;
    let amt=parseFloat(r[11])||0;
    if(r[10]==='TUNAI')t+=amt;
    if(r[10]==='COD')c+=amt;
    if(r[10]==='ACC')a+=amt;
  });

  fetch(SCRIPT_URL,{
    method:'POST',
    mode:'no-cors',
    body:JSON.stringify({
      action:'doneAll',
      tunai:t,
      cod:c,
      acc:a,
      total:(t+c+a)
    })
  });

  alert('Done All berjaya disimpan ke sheet!');
}

function resetDate(){
  document.getElementById('modal-msg').textContent=
    'Semua data untuk '+dateDisplay.textContent+' akan didelete.';
  document.getElementById('modal-overlay').style.display='flex';
}

function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
}

function confirmReset(){
  closeModal();
  const d=dateInput.value;
  fetch(SCRIPT_URL+'?action=resetByDate&date='+d)
  .then(r=>r.json())
  .then(()=>load())
  .catch(()=>load());
}

load();
</script>

</body>
</html>
