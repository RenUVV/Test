<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Segoe UI',Arial,sans-serif;
min-height:100vh;
color:#e5e7eb;
background:radial-gradient(circle at 15% 20%,#1e293b 0%,#0b1220 45%,#0f172a 100%);
animation:bgmove 18s ease-in-out infinite alternate;
}

@keyframes bgmove{
0%{background-position:0% 0%;}
100%{background-position:100% 100%;}
}

.topbar{
background:rgba(10,15,28,0.75);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
padding:0 24px;
height:56px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.06);
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-brand .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;}
.topbar h1{font-size:15px;font-weight:600;}
.topbar a{color:#93c5fd;text-decoration:none;font-size:12px;transition:.2s;}
.topbar a:hover{opacity:.7;}

.page{
padding:24px 20px 40px;
animation:fadein .8s ease forwards;
transform:translateY(15px);
opacity:0;
}

@keyframes fadein{
to{transform:translateY(0);opacity:1;}
}

.date-section{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border-radius:18px;
padding:18px 22px;
margin-bottom:22px;
border:1px solid rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.date-nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.date-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;}
.date-display{font-size:17px;font-weight:600;color:#f1f5f9;}

.nav-btn{
width:34px;height:34px;
border-radius:10px;
border:1px solid #334155;
background:#0f1b2e;
color:#e5e7eb;
cursor:pointer;
transition:.25s;
}

.nav-btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(30,58,138,0.3);
}

input[type=date]{
background:#0f1b2e;
border:1px solid #334155;
border-radius:10px;
padding:7px 12px;
color:#e5e7eb;
}

.date-actions{display:flex;gap:10px;flex-wrap:wrap;}

.btn-reset,.btn-doneall{
padding:8px 18px;
border-radius:10px;
border:none;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.btn-reset{
background:linear-gradient(135deg,#5f1414,#3f0f0f);
color:#fca5a5;
}

.btn-doneall{
background:linear-gradient(135deg,#14532d,#0f3d2e);
color:#6ee7b7;
}

.btn-reset:hover,.btn-doneall:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,0.4);
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:22px;
}

.stat-card{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(12px);
border-radius:18px;
padding:20px 24px;
border:1px solid rgba(255,255,255,0.05);
transition:.3s;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.stat-card:hover{
transform:translateY(-4px);
}

.stat-card.total{border-top:3px solid #1e3a8a;}
.stat-card.tunai{border-top:3px solid #166534;}
.stat-card.cod{border-top:3px solid #7c2d12;}
.stat-card.acc{border-top:3px solid #4c1d95;}

.stat-label{font-size:11px;color:#94a3b8;text-transform:uppercase;}
.stat-count{font-size:28px;font-weight:700;margin-top:6px;color:#f1f5f9;}
.stat-amount{font-size:13px;margin-top:4px;color:#9ca3af;}

.filters-row{
display:flex;
gap:14px;
margin-bottom:18px;
align-items:center;
flex-wrap:wrap;
}

.search-wrap{position:relative;flex:1;}

.search-wrap input{
width:100%;
padding:11px 12px 11px 38px;
background:#0b1220;
border:1px solid #334155;
border-radius:12px;
color:#e5e7eb;
transition:.25s;
}

.search-wrap input:focus{
outline:none;
border-color:#1e3a8a;
box-shadow:0 0 0 1px rgba(30,58,138,0.5);
background:#0f1b2e;
}

.search-icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#64748b;
}

.filter-select{
background:#0b1220;
border:1px solid #334155;
border-radius:12px;
padding:10px 14px;
color:#e5e7eb;
transition:.25s;
}

.filter-select:focus{
outline:none;
border-color:#1e3a8a;
box-shadow:0 0 0 1px rgba(30,58,138,0.5);
}

.table-wrap{
background:rgba(15,23,42,0.75);
backdrop-filter:blur(12px);
border-radius:18px;
border:1px solid rgba(255,255,255,0.05);
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.table-header{
padding:16px 22px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
}

.table-title{font-weight:600;color:#f1f5f9;}
.table-count{font-size:12px;color:#94a3b8;}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
}

th, td {
    padding: 14px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    color: #e5e7eb;
    text-align: center;
    vertical-align: middle;
}

thead tr {
    background: #0f1b2e;
}

th {
    font-size: 11px;
    text-transform: uppercase;
    color: #64748b;
    text-align: center;
}

tbody tr {
    transition: .25s;
}

tbody tr:hover {
    background: #1e293b;
    transform: scale(1.01);
}

td:nth-child(8) {
    min-width: 100px;
    word-break: break-word;
}

.pay-badge{
padding:4px 10px;
border-radius:6px;
font-size:11px;
font-weight:600;
}

.pay-badge.TUNAI{background:#052e26;color:#34d399;}
.pay-badge.COD{background:#451a03;color:#fb923c;}
.pay-badge.ACC{background:#2e1065;color:#c084fc;}

.loading,.empty{
text-align:center;
padding:40px;
color:#64748b;
}

#modal-overlay{
background:rgba(0,0,0,0.6)!important;
backdrop-filter:blur(6px);
}

#modal-overlay > div{
background:rgba(15,23,42,0.95)!important;
color:#f1f5f9;
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.delete-btn {
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    margin: 0 auto; 
    display: block;
}

.delete-btn:hover {
    color: #dc2626; 
    transform: scale(1.1);
}

@media(max-width:768px){
.stats-grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.stats-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="dot"></div>
    <h1>Dashboard - Arsyila Bersaudara</h1>
  </div>
  <a href="index.html">← Back</a>
</div>

<div class="page">

  <div class="date-section">
    <div class="date-nav">
      <button class="nav-btn" onclick="prevDate()">&#9664;</button>
      <div>
        <div class="date-label">Date</div>
        <div class="date-display" id="date-display">—</div>
      </div>
      <button class="nav-btn" onclick="nextDate()">&#9654;</button>
      <input type="date" id="date" onchange="onDateChange()" style="margin-left:8px;">
    </div>
    <div class="date-actions">
      <button class="btn-reset" onclick="resetDate()">Reset</button>
      <button class="btn-doneall" onclick="doneAll()">Done</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card total">
      <div class="stat-label">Total Bill</div>
      <div class="stat-count" id="st-total">0</div>
      <div class="stat-amount" id="st-total-amt">RM 0.00</div>
    </div>
    <div class="stat-card tunai">
      <div class="stat-label">Cash</div>
      <div class="stat-count" id="st-tunai">0</div>
      <div class="stat-amount" id="sum-tunai">RM 0.00</div>
    </div>
    <div class="stat-card cod">
      <div class="stat-label">COD</div>
      <div class="stat-count" id="st-cod">0</div>
      <div class="stat-amount" id="sum-cod">RM 0.00</div>
    </div>
    <div class="stat-card acc">
      <div class="stat-label">ACC</div>
      <div class="stat-count" id="st-acc">0</div>
      <div class="stat-amount" id="sum-acc">RM 0.00</div>
    </div>
  </div>

  <div class="filters-row">
    <div class="search-wrap">
      <input type="text" id="f-search" placeholder="Search" oninput="renderTable()">
    </div>
    <select class="filter-select" id="f-pay" onchange="renderTable()">
      <option value="">All Types</option>
      <option value="TUNAI">CASH</option>
      <option value="COD">COD</option>
      <option value="ACC">ACC</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">Senarai Bil</div>
      <div class="table-count" id="table-count">0 rekod</div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>NO</th><th>DATE</th><th>STAFF</th>
            <th>SENDER</th><th>Tel</th><th>FROM</th>
            <th>RECEIVER</th><th>Tel</th><th>TO</th>
            <th>DETAILS</th><th>PAYMENT</th><th>RM</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="13" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:12px;padding:24px;margin:16px;max-width:320px;width:100%;">
    <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Confirm Delete</div>
    <div style="font-size:13px;margin-bottom:20px;" id="modal-msg"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="closeModal()" style="padding:8px 16px;border-radius:8px;border:1px solid #e2e8f0;background:white;">Cancel</button>
      <button onclick="confirmDelete()" style="padding:8px 16px;border-radius:8px;border:none;background:#fee2e2;color:#991b1b;font-weight:600;">Yes, Delete</button>
    </div>
  </div>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzM_HfWi3_4T9oHTNFREURfd5jm9HG05FVlhJ4blTN0bNNP0Mg6TESv8ldadrleNweAxA/exec";

let data=[];
let itemToDelete = null;
const dateInput=document.getElementById('date');
const dateDisplay=document.getElementById('date-display');

function today(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function formatDisplay(val){
  if(!val)return'—';
  const[y,m,d]=val.split('-');
  const months=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogs','Sep','Okt','Nov','Dis'];
  return d+' '+months[parseInt(m)-1]+' '+y;
}

function setDate(val){
  dateInput.value=val;
  dateDisplay.textContent=formatDisplay(val);
}

setDate(today());

function onDateChange(){dateDisplay.textContent=formatDisplay(dateInput.value);load();}
function prevDate(){let d=new Date(dateInput.value);d.setDate(d.getDate()-1);setDate(d.toISOString().split('T')[0]);load();}
function nextDate(){let d=new Date(dateInput.value);d.setDate(d.getDate()+1);setDate(d.toISOString().split('T')[0]);load();}

function load(){
  const d=dateInput.value;
  fetch(SCRIPT_URL+"?action=getAll&date="+d)
  .then(r=>r.json())
  .then(json=>{
    data=json.data||[];
    renderTable();
    calc();
  })
  .catch(()=>{
    document.getElementById('tbody').innerHTML='<tr><td colspan="13" class="empty">Gagal memuatkan data.</td></tr>';
  });
}

function renderTable(){
  const tb=document.getElementById('tbody');
  const s=document.getElementById('f-search').value.toLowerCase();
  const pay=document.getElementById('f-pay').value;

  let filtered=data.filter(r=>{
    if(!r || r.join('').trim()==='')return false;
    return(!s||r.join(' ').toLowerCase().includes(s))&&(!pay||r[10]===pay);
  });

  document.getElementById('table-count').textContent=filtered.length+' rekod';

  if(!filtered.length){
    tb.innerHTML='<tr><td colspan="13" class="empty">No Data Found.</td></tr>';
    return;
  }

  tb.innerHTML=filtered.map(r=>`
  <tr>
    <td><strong>${r[0]}</strong></td>
    <td>${r[1]}</td>
    <td>${r[2]}</td>
    <td>${r[3]}</td>
    <td>${r[4]}</td>
    <td>${r[5]}</td>
    <td>${r[6]}</td>
    <td>${r[7]}</td>
    <td>${r[8]}</td>
    <td>${r[9]}</td>
    <td><span class="pay-badge ${r[10]}">${r[10]}</span></td>
    <td><strong>RM ${parseFloat(r[11]||0).toFixed(2)}</strong></td>
    <td><button class="delete-btn" onclick="showDeleteModal('${r[0]}', '${r[1]}')">✕</button></td>
  </tr>`).join('');
}

function calc(){
  let t=0,c=0,a=0,ct=0,cc=0,ca=0;
  data.forEach(r=>{
    if(!r || r.join('').trim()==='')return;
    let amt=parseFloat(r[11])||0;
    if(r[10]==='TUNAI'){t+=amt;ct++;}
    if(r[10]==='COD'){c+=amt;cc++;}
    if(r[10]==='ACC'){a+=amt;ca++;}
  });
  const total=ct+cc+ca;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-total-amt').textContent='RM '+(t+c+a).toFixed(2);
  document.getElementById('st-tunai').textContent=ct;
  document.getElementById('sum-tunai').textContent='RM '+t.toFixed(2);
  document.getElementById('st-cod').textContent=cc;
  document.getElementById('sum-cod').textContent='RM '+c.toFixed(2);
  document.getElementById('st-acc').textContent=ca;
  document.getElementById('sum-acc').textContent='RM '+a.toFixed(2);
}

function doneAll(){
  let t=0,c=0,a=0;
  data.forEach(r=>{
    if(!r || r.join('').trim()==='')return;
    let amt=parseFloat(r[11])||0;
    if(r[10]==='TUNAI')t+=amt;
    if(r[10]==='COD')c+=amt;
    if(r[10]==='ACC')a+=amt;
  });

fetch(SCRIPT_URL,{
  method:'POST',
  mode:'no-cors',
  body:JSON.stringify({
    action:'doneAll',
    date: dateInput.value,
    tunai:t,
    cod:c,
    acc:a,
    total:(t+c+a)
  })
});

  alert('Done');
}

function resetDate(){
  document.getElementById('modal-msg').textContent=
    'All data for '+dateDisplay.textContent+' will be deleted.';
  document.getElementById('modal-overlay').style.display='flex';
}

function showDeleteModal(no, tarikh) {
    itemToDelete = { no, tarikh };
    document.getElementById('modal-msg').textContent =
        'Are you sure you want to delete bill No. ' + no + '?';
    document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
  itemToDelete = null;
}

function confirmDelete(){
    if (!itemToDelete) {
        closeModal();
        return;
    }
    const { no, tarikh } = itemToDelete;
    closeModal();

    fetch(SCRIPT_URL + '?action=deleteBill&no=' + encodeURIComponent(no) + '&tarikh=' + encodeURIComponent(tarikh))
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            load();
        } else {
            alert('Gagal memadam: ' + (result.message || 'Tiada respons'));
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Ralat semasa menghubungi server.');
    });
}

function confirmReset(){
  closeModal();
  const d=dateInput.value;
  fetch(SCRIPT_URL+'?action=resetByDate&date='+d)
  .then(r=>r.json())
  .then(()=>load())
  .catch(()=>load());
}

load();
</script>

</body>
</html>
