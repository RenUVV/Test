<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #333; }
        .topbar { background: #2c3e50; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { font-size: 16px; font-weight: bold; }
        .topbar a { color: #aed6f1; font-size: 13px; text-decoration: none; }
        .topbar a:hover { color: white; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 16px; }
        .stat-card { background: white; border-radius: 8px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); border-top: 4px solid #2c3e50; }
        .stat-card.tunai { border-top-color: #27ae60; }
        .stat-card.cod { border-top-color: #e67e22; }
        .stat-card.acc { border-top-color: #8e44ad; }
        .stat-card .val { font-size: 20px; font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
        .stat-card .lbl { font-size: 11px; color: #888; text-transform: uppercase; }
        .summary-box { margin: 0 16px 16px 16px; background: white; border-radius: 8px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
        .summary-item { padding: 10px 12px; border-radius: 6px; }
        .summary-item.tunai { background: #d5f5e3; }
        .summary-item.cod { background: #fdebd0; }
        .summary-item.acc { background: #e8daef; }
        .summary-item.all { background: #fef9e7; border: 2px solid #f39c12; }
        .summary-item .s-lbl { font-size: 11px; color: #555; margin-bottom: 3px; font-weight: bold; }
        .summary-item .s-val { font-size: 17px; font-weight: bold; }
        .filters { padding: 0 16px 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
        .filters input, .filters select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; min-width: 120px; }
        .filters button { padding: 8px 16px; background: #2c3e50; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .filters button:hover { background: #34495e; }
        .table-wrap { padding: 0 16px 16px 16px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-size: 12px; }
        thead { background: #2c3e50; color: white; }
        thead th { padding: 10px 8px; text-align: left; white-space: nowrap; }
        tbody tr:nth-child(even) { background: #f8f9fa; }
        tbody tr:hover { background: #eaf4fb; }
        tbody tr.done-row { opacity: 0.55; }
        tbody td { padding: 8px; border-bottom: 1px solid #eee; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge.tunai { background: #d5f5e3; color: #1e8449; }
        .badge.cod { background: #fdebd0; color: #b9770e; }
        .badge.acc { background: #e8daef; color: #7d3c98; }
        .badge.done { background: #d5f5e3; color: #1e8449; }
        .btn-done { padding: 4px 10px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .btn-done:hover { background: #1e8449; }
        .btn-done:disabled { background: #ccc; cursor: default; }
        .loading, .empty { text-align: center; padding: 40px; color: #888; font-size: 14px; }
        .total-row { padding: 6px 16px 10px 16px; text-align: right; font-size: 13px; color: #555; }
        .total-row strong { color: #2c3e50; }
        .date-bar { padding: 0 16px 10px 16px; display: flex; gap: 8px; align-items: center; }
        .date-bar input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; }
        .date-bar button { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-reset { background: #c0392b; color: white; }
    </style>
</head>
<body>

<div class="topbar">
    <h1> Dashboard</h1>
    <a href="index.html">← Balik ke Form Bil</a>
</div>

<div class="stats-row">
    <div class="stat-card">
        <div class="val" id="st-total-bil">—</div>
        <div class="lbl">Jumlah Bil</div>
    </div>
    <div class="stat-card tunai">
        <div class="val" id="st-tunai-count">—</div>
        <div class="lbl">Bil Tunai</div>
    </div>
    <div class="stat-card cod">
        <div class="val" id="st-cod-count">—</div>
        <div class="lbl">Bil COD</div>
    </div>
    <div class="stat-card acc">
        <div class="val" id="st-acc-count">—</div>
        <div class="lbl">Bil ACC</div>
    </div>
</div>

<div class="summary-box">
    <div class="summary-item tunai">
        <div class="s-lbl">TOTAL CASH</div>
        <div class="s-val" id="sum-tunai">RM 0.00</div>
    </div>
    <div class="summary-item cod">
        <div class="s-lbl">TOTAL COD</div>
        <div class="s-val" id="sum-cod">RM 0.00</div>
    </div>
    <div class="summary-item acc">
        <div class="s-lbl">TOTAL ACC</div>
        <div class="s-val" id="sum-acc">RM 0.00</div>
    </div>
    <div class="summary-item all">
        <div class="s-lbl">TOTAL AMMOUNT</div>
        <div class="s-val" id="sum-all">RM 0.00</div>
    </div>
</div>

<div class="filters">
    <input type="text" id="f-search" placeholder=" Find Bill" oninput="applyFilter()">
    <select id="f-bayaran" onchange="applyFilter()">
        <option value="">ALL PAYMENT</option>
        <option value="TUNAI">CASH</option>
        <option value="COD">COD</option>
        <option value="ACC">ACC</option>
    </select>
    <select id="f-status" onchange="applyFilter()">
        <option value="">Semua Status</option>
        <option value="PENDING">Pending</option>
        <option value="DONE">Done</option>
    </select>
    <input type="date" id="f-from" onchange="applyFilter()">
    <input type="date" id="f-to" onchange="applyFilter()">
    <button onclick="resetFilter()">Reset</button>
</div>

<div class="date-bar">
    <button onclick="prevDate()">◀</button>
    <input type="date" id="selected-date">
    <button onclick="nextDate()">▶</button>
    <button class="btn-reset" onclick="resetDate()">RESET</button>
</div>

<div class="total-row" id="total-row"></div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>No Bil</th><th>Tarikh</th><th>Staff</th>
                <th>Pengirim</th><th>Tel</th><th>Dari</th>
                <th>Penerima</th><th>Tel</th><th>Ke</th>
                <th>Butiran</th><th>Bayaran</th><th>RM</th><th>Status</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="13" class="loading">⏳ Memuatkan data...</td></tr>
        </tbody>
    </table>
</div>

<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwQPr7cqE-ZuUsk976P5yXunPoZiXYrUwqAowNoHfbFLWlKoR9utp391bED6kLiGUpPMA/exec";
let allData=[];
const dateInput=document.getElementById("selected-date");
dateInput.value=new Date().toISOString().split("T")[0];
function formatDateDisplay(dateStr){const d=new Date(dateStr);return String(d.getDate()).padStart(2,'0')+"/"+String(d.getMonth()+1).padStart(2,'0')+"/"+d.getFullYear();}
function jsonp(url,callbackName,onSuccess){window[callbackName]=function(data){delete window[callbackName];onSuccess(data);};const s=document.createElement("script");s.src=url+"&callback="+callbackName+"&t="+Date.now();document.body.appendChild(s);}
function loadByDate(){const selected=formatDateDisplay(dateInput.value);jsonp(APPS_SCRIPT_URL+"?action=getByDate&date="+selected,"_cbDate",function(json){allData=json.data||[];applyFilter();updateStats(allData);});}
function nextDate(){let d=new Date(dateInput.value);d.setDate(d.getDate()+1);dateInput.value=d.toISOString().split("T")[0];loadByDate();}
function prevDate(){let d=new Date(dateInput.value);d.setDate(d.getDate()-1);dateInput.value=d.toISOString().split("T")[0];loadByDate();}
function resetDate(){if(!confirm("Padam semua data untuk tarikh ini?"))return;const selected=formatDateDisplay(dateInput.value);jsonp(APPS_SCRIPT_URL+"?action=resetByDate&date="+selected,"_cbReset",function(){loadByDate();});}
function applyFilter(){renderTable(allData);}
function resetFilter(){document.getElementById("f-search").value="";document.getElementById("f-bayaran").value="";document.getElementById("f-status").value="";document.getElementById("f-from").value="";document.getElementById("f-to").value="";applyFilter();}
function updateStats(data){let tunai=0,cod=0,acc=0;data.forEach(r=>{let amt=parseFloat(r[11])||0;let pay=(r[10]+'').toUpperCase();if(pay==="TUNAI")tunai+=amt;if(pay==="COD")cod+=amt;if(pay==="ACC")acc+=amt;});document.getElementById('sum-tunai').textContent="RM "+tunai.toFixed(2);document.getElementById('sum-cod').textContent="RM "+cod.toFixed(2);document.getElementById('sum-acc').textContent="RM "+acc.toFixed(2);document.getElementById('sum-all').textContent="RM "+(tunai+cod+acc).toFixed(2);document.getElementById('st-total-bil').textContent=data.length;document.getElementById('st-tunai-count').textContent=data.filter(r=>(r[10]+'').toUpperCase()==="TUNAI").length;document.getElementById('st-cod-count').textContent=data.filter(r=>(r[10]+'').toUpperCase()==="COD").length;document.getElementById('st-acc-count').textContent=data.filter(r=>(r[10]+'').toUpperCase()==="ACC").length;}
function renderTable(data){const tbody=document.getElementById("table-body");if(!data.length){tbody.innerHTML='<tr><td colspan="13" class="empty">Tiada rekod untuk tarikh ini.</td></tr>';return;}tbody.innerHTML=data.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td>${r[8]}</td><td>${r[9]}</td><td>${r[10]}</td><td><strong>RM ${parseFloat(r[11]||0).toFixed(2)}</strong></td><td>${r[12]}</td></tr>`).join('');}
loadByDate();
</script>
</body>
</html>
