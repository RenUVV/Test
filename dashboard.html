<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Arsyila Bersaudara</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #333; }

        .topbar {
            background: #2c3e50;
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h1 { font-size: 16px; font-weight: bold; }
        .topbar a { color: #aed6f1; font-size: 13px; text-decoration: none; }
        .topbar a:hover { color: white; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            padding: 16px;
        }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            border-top: 4px solid #2c3e50;
        }
        .stat-card.tunai { border-top-color: #27ae60; }
        .stat-card.cod { border-top-color: #e67e22; }
        .stat-card.acc { border-top-color: #8e44ad; }
        .stat-card .val { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
        .stat-card .lbl { font-size: 11px; color: #888; text-transform: uppercase; }

        .filters {
            padding: 0 16px 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 120px;
        }
        .filters button {
            padding: 8px 16px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .filters button:hover { background: #34495e; }

        .table-wrap {
            padding: 0 16px 16px 16px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            font-size: 13px;
        }
        thead { background: #2c3e50; color: white; }
        thead th { padding: 11px 10px; text-align: left; white-space: nowrap; }
        tbody tr:nth-child(even) { background: #f8f9fa; }
        tbody tr:hover { background: #eaf4fb; }
        tbody td { padding: 9px 10px; border-bottom: 1px solid #eee; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge.tunai { background: #d5f5e3; color: #1e8449; }
        .badge.cod { background: #fdebd0; color: #b9770e; }
        .badge.acc { background: #e8daef; color: #7d3c98; }

        .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
        .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

        .total-row {
            padding: 8px 16px;
            text-align: right;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }
        .total-row strong { color: #2c3e50; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>📊 Dashboard — Arsyila Bersaudara</h1>
    <a href="index.html">← Balik ke Form Bil</a>
</div>

<div class="stats-row">
    <div class="stat-card">
        <div class="val" id="st-total-bil">—</div>
        <div class="lbl">Jumlah Bil</div>
    </div>
    <div class="stat-card">
        <div class="val" id="st-total-rm">—</div>
        <div class="lbl">Total Kutipan (RM)</div>
    </div>
    <div class="stat-card tunai">
        <div class="val" id="st-tunai">—</div>
        <div class="lbl">Tunai</div>
    </div>
    <div class="stat-card cod">
        <div class="val" id="st-cod">—</div>
        <div class="lbl">COD</div>
    </div>
    <div class="stat-card acc">
        <div class="val" id="st-acc">—</div>
        <div class="lbl">ACC</div>
    </div>
</div>

<div class="filters">
    <input type="text" id="f-search" placeholder="🔍 Cari nama / no bil..." oninput="applyFilter()">
    <select id="f-bayaran" onchange="applyFilter()">
        <option value="">Semua Bayaran</option>
        <option value="TUNAI">TUNAI</option>
        <option value="COD">COD</option>
        <option value="ACC">ACC</option>
    </select>
    <input type="date" id="f-from" onchange="applyFilter()">
    <input type="date" id="f-to" onchange="applyFilter()">
    <button onclick="resetFilter()">Reset</button>
</div>

<div class="total-row" id="total-row"></div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>No Bil</th>
                <th>Tarikh</th>
                <th>Staff</th>
                <th>Pengirim</th>
                <th>Tel P/girim</th>
                <th>Dari</th>
                <th>Penerima</th>
                <th>Tel P/rima</th>
                <th>Ke</th>
                <th>Butiran</th>
                <th>Bayaran</th>
                <th>RM</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="12" class="loading">Memuatkan data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu4oHXkWM_TvMp7Zw3kDNWA1ie9sZFgqWQfG0sEqVBBy_OFXOgUOZDLCE_F3GdaB9w/exec";

    let allData = [];

    async function loadData() {
        try {
            const res = await fetch(APPS_SCRIPT_URL + "?action=getAll");
            const json = await res.json();
            allData = json.data || [];
            applyFilter();
            updateStats(allData);
        } catch(e) {
            document.getElementById('table-body').innerHTML = '<tr><td colspan="12" class="empty">Gagal memuatkan data. Cuba refresh.</td></tr>';
        }
    }

    function updateStats(data) {
        const total = data.length;
        const totalRM = data.reduce((sum, r) => sum + (parseFloat(r[11]) || 0), 0);
        const tunai = data.filter(r => r[10] === 'TUNAI').length;
        const cod = data.filter(r => r[10] === 'COD').length;
        const acc = data.filter(r => r[10] === 'ACC').length;

        document.getElementById('st-total-bil').textContent = total;
        document.getElementById('st-total-rm').textContent = 'RM ' + totalRM.toFixed(2);
        document.getElementById('st-tunai').textContent = tunai;
        document.getElementById('st-cod').textContent = cod;
        document.getElementById('st-acc').textContent = acc;
    }

    function parseDate(str) {
        // str format: DD/MM/YYYY
        if (!str) return null;
        const parts = str.split('/');
        if (parts.length !== 3) return null;
        return new Date(parts[2], parts[1]-1, parts[0]);
    }

    function applyFilter() {
        const search = document.getElementById('f-search').value.toLowerCase();
        const bayaran = document.getElementById('f-bayaran').value;
        const from = document.getElementById('f-from').value;
        const to = document.getElementById('f-to').value;

        let filtered = allData.filter(r => {
            const matchSearch = !search ||
                (r[0]+'').toLowerCase().includes(search) ||
                (r[3]+'').toLowerCase().includes(search) ||
                (r[6]+'').toLowerCase().includes(search) ||
                (r[4]+'').toLowerCase().includes(search) ||
                (r[7]+'').toLowerCase().includes(search);

            const matchBayaran = !bayaran || r[10] === bayaran;

            const rowDate = parseDate(r[1]);
            const fromDate = from ? new Date(from) : null;
            const toDate = to ? new Date(to) : null;
            const matchFrom = !fromDate || (rowDate && rowDate >= fromDate);
            const matchTo = !toDate || (rowDate && rowDate <= toDate);

            return matchSearch && matchBayaran && matchFrom && matchTo;
        });

        renderTable(filtered);

        const totalRM = filtered.reduce((sum, r) => sum + (parseFloat(r[11]) || 0), 0);
        document.getElementById('total-row').innerHTML =
            `Menunjukkan <strong>${filtered.length}</strong> rekod &nbsp;|&nbsp; Jumlah: <strong>RM ${totalRM.toFixed(2)}</strong>`;
    }

    function resetFilter() {
        document.getElementById('f-search').value = '';
        document.getElementById('f-bayaran').value = '';
        document.getElementById('f-from').value = '';
        document.getElementById('f-to').value = '';
        applyFilter();
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="12" class="empty">Tiada rekod dijumpai.</td></tr>';
            return;
        }

        // Sort by No Bil descending (latest first)
        const sorted = [...data].sort((a, b) => parseInt(b[0]) - parseInt(a[0]));

        tbody.innerHTML = sorted.map(r => {
            const bayaran = (r[10] || '').toUpperCase();
            const badgeClass = bayaran === 'TUNAI' ? 'tunai' : bayaran === 'COD' ? 'cod' : 'acc';
            return `<tr>
                <td><strong>${r[0] || ''}</strong></td>
                <td>${r[1] || ''}</td>
                <td>${r[2] || ''}</td>
                <td>${r[3] || ''}</td>
                <td>${r[4] || ''}</td>
                <td>${r[5] || ''}</td>
                <td>${r[6] || ''}</td>
                <td>${r[7] || ''}</td>
                <td>${r[8] || ''}</td>
                <td>${r[9] || ''}</td>
                <td><span class="badge ${badgeClass}">${bayaran}</span></td>
                <td><strong>RM ${parseFloat(r[11] || 0).toFixed(2)}</strong></td>
            </tr>`;
        }).join('');
    }

    loadData();
</script>

</body>
</html>
