<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arsyila Bersaudara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>BILL</h1>
    <div class="grid">
        <div class="input-group">
            <label>Bill No.</label>
            <input type="number" id="n_no" value="1" placeholder="Auto...">
        </div>
        <div class="input-group">
            <label>Date</label>
            <input type="date" id="t_date">
        </div>
        <div class="input-group full">
            <label>Staff Name</label>
            <input type="text" id="staff" placeholder="Staff name">
        </div>

        <div class="section-label">SENDER</div>
        <div class="input-group full"><label>Name</label><input type="text" id="s_n" placeholder="Sender name"></div>
        <div class="input-group full"><label>Phone No.</label><input type="text" id="s_p" placeholder="Sender phone"></div>
        <div class="input-group full">
            <label>Address</label>
            <select id="s_a_sel" onchange="h_addr('s')">
                <option value="">-- Select Address --</option>
                <option value="TWU">TWU</option>
                <option value="KGU">KGU</option>
                <option value="SDK">SDK</option>
                <option value="K.K">K.K</option>
                <option value="L.D">L.D</option>
                <option value="K.MAS">K.MAS</option>
                <option value="NBWN">NBWN</option>
            </select>
            <input type="text" id="s_a" placeholder="Or type address here" style="margin-top:6px;">
        </div>

        <div class="section-label">RECEIVER</div>
        <div class="input-group full"><label>Name</label><input type="text" id="r_n" placeholder="Receiver name"></div>
        <div class="input-group full"><label>Phone No.</label><input type="text" id="r_p" placeholder="Receiver phone"></div>
        <div class="input-group full">
            <label>Address</label>
            <select id="r_a_sel" onchange="h_addr('r')">
                <option value="">-- Select Address --</option>
                <option value="TWU">TWU</option>
                <option value="KGU">KGU</option>
                <option value="SDK">SDK</option>
                <option value="K.K">K.K</option>
                <option value="L.D">L.D</option>
                <option value="K.MAS">K.MAS</option>
                <option value="NBWN">NBWN</option>
            </select>
            <input type="text" id="r_a" placeholder="Or type address here" style="margin-top:6px;">
        </div>

        <div class="section-label">ITEM & PAYMENT</div>
        <div class="input-group full"><label>Item Details</label><textarea id="desc" rows="3" placeholder="Item details"></textarea></div>
        <div class="input-group full">
            <label>Payment Type</label>
            <select id="pay_type">
                <option value="TUNAI">TUNAI</option>
                <option value="COD">COD</option>
                <option value="ACC">ACC</option>
            </select>
        </div>
        <div class="input-group full">
            <label>Amount (RM)</label>
            <input type="number" id="prc" placeholder="0.00" step="0.01">
        </div>
        <button onclick="p_t()">🖨️ PRINT BILL</button>
        <button class="btn-img" onclick="s_img()">💾 SAVE AS PDF</button>
        <button class="btn-dashboard" onclick="window.location.href='dashboard.html'">📊 DASHBOARD</button>
    </div>
</div>

<div id="receipt"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwQPr7cqE-ZuUsk976P5yXunPoZiXYrUwqAowNoHfbFLWlKoR9utp391bED6kLiGUpPMA/exec";

const dateInput=document.getElementById('t_date');
dateInput.value=new Date().toISOString().split('T')[0];

function h_addr(side){
    const sel=document.getElementById(side+'_a_sel');
    const inp=document.getElementById(side+'_a');
    inp.value=sel.value||'';
}

function getFormData(){
    return{
        noBil:document.getElementById('n_no').value,
        tarikh:dateInput.value,
        staff:document.getElementById('staff').value,
        namaPengirim:document.getElementById('s_n').value,
        telPengirim:document.getElementById('s_p').value,
        alamatPengirim:document.getElementById('s_a').value,
        namaPenerima:document.getElementById('r_n').value,
        telPenerima:document.getElementById('r_p').value,
        alamatPenerima:document.getElementById('r_a').value,
        butiran:document.getElementById('desc').value,
        bayaran:document.getElementById('pay_type').value,
        jumlah:document.getElementById('prc').value
    };
}

async function saveToSheets(data){
    await fetch(APPS_SCRIPT_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
    });
}

function incrementBill(){
    let current=parseInt(document.getElementById('n_no').value)||0;
    document.getElementById('n_no').value=current+1;
}

async function p_t(){
    const data=getFormData();
    await saveToSheets(data);
    incrementBill();
    window.print();
}

async function s_img(){
    const data=getFormData();
    const canvas=await html2canvas(document.body,{scale:2});
    const {jsPDF}=window.jspdf;
    const imgData=canvas.toDataURL('image/png');
    const pdf=new jsPDF();
    pdf.addImage(imgData,'PNG',0,0,210,297);
    pdf.save('bil-'+data.noBil+'.pdf');
    await saveToSheets(data);
    incrementBill();
}
</script>

</body>
</html>
